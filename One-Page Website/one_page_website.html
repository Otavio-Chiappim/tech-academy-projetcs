<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My One Page Website</title>
</head>
<body>

    <!-- NAVIGATION -->
    <nav>
        <a href="#home">Home</a> |
        <a href="#gallery">Gallery</a> |
        <a href="#video">Video</a> |
        <a href="#contact">Contact</a>
    </nav>

    <!-- HOME SECTION -->
    <section id="home">
        <h1>Welcome to My Website</h1>
        <p>This is my first one-page website built with HTML.</p>
    </section>

    <hr>

    <!-- IMAGE SECTION -->
    <section id="gallery">
        <h2>Gallery</h2>
        <img src="https://via.placeholder.com/200" alt="Image 1">
        <img src="https://via.placeholder.com/200" alt="Image 2">
        <img src="https://via.placeholder.com/200" alt="Image 3">
    </section>

    <hr>

    <!-- VIDEO SECTION -->
    <section id="video">
        <h2>My Video</h2>
        <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/tgbNymZ7vqY" 
            title="YouTube video">
        </iframe>
    </section>

    <hr>

    <!-- CONTACT FORM -->
    <section id="contact">
        <h2>Contact Me</h2>
        <form>
            <label>Name:</label><br>
            <input type="text" name="name"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <label>Message:</label><br>
            <textarea name="message"></textarea><br><br>

            <input type="submit" value="Send">
        </form>
    </section>

    <hr>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
